<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja de la Asociación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="main-title">Asociación "El Pueblo"</h1>
        <div id="user-info" class="hidden">
            <span id="current-user-name"></span> | Saldo: <strong id="current-user-balance">€0.00</strong>
            <button onclick="logout()" class="btn-small">Salir</button>
        </div>
    </header>

    <main class="container">
        <section id="socios-section" class="card">
            <h2>¿Quién eres?</h2>
            <div id="lista-socios" class="grid-socios"></div>
            <hr>
            <button id="admin-access" class="btn-secondary">⚙️ Gestión Tesorería</button>
        </section>

        <section id="productos-section" class="hidden">
            <h2>Selecciona tu consumición</h2>
            <div id="grid-productos" class="grid-productos"></div>
        </section>

        <section id="admin-section" class="card hidden">
            <button onclick="closeAdmin()" class="btn-small">Volver</button>
            <h2>Panel de Control</h2>
            <div class="tabs">
                <button onclick="showTab('tab-usuarios')">Socios/Saldo</button>
                <button onclick="showTab('tab-stock')">Inventario</button>
                <button onclick="showTab('tab-caja')">Caja/Ventas</button>
            </div>
            
            <div id="tab-usuarios" class="tab-content">
                <h3>Añadir/Recargar Socio</h3>
                <input type="text" id="member-name" placeholder="Nombre del Socio">
                <input type="number" id="member-initial-cash" placeholder="Carga Inicial €">
                <button onclick="addMember()" class="btn-success">Registrar/Cargar</button>
            </div>
            </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
