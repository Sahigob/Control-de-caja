<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Asociación - Gestión de Almacén</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        .caja-badge { background: white; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; border: 2px solid var(--accent); }

        .app-layout { display: flex; flex: 1; overflow: hidden; }
        .productos-section { flex: 1; overflow-y: auto; padding: 20px; border-right: 2px solid #ddd; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .producto-card { background: white; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #ddd; cursor: pointer; position: relative; transition: 0.2s; }
        .producto-card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 8px; }
        .stock-tag { position: absolute; top: 5px; left: 5px; background: #eee; padding: 2px 6px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .btn-delete-card { position: absolute; top: 5px; right: 5px; color: #ccc; font-size: 14px; padding: 5px; }

        .ticket-section { width: 350px; background: white; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        .ticket-header { padding: 15px; background: #eee; font-weight: bold; text-align: center; }
        .ticket-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ticket-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .ticket-footer { padding: 20px; background: #f9f9f9; border-top: 2px solid #ddd; }
        .total-pagar { font-size: 2rem; font-weight: 900; text-align: center; color: var(--primary); margin-bottom: 15px; }
        .btn-cobrar { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; max-height: 80vh; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="login-section" class="modal">
        <div class="modal-content" style="max-width: 300px">
            <h2>Acceso TPV</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()" style="background: var(--accent); color:white; width:100%; padding:15px; border-radius:8px; border:none; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden" style="height:100vh; display:flex; flex-direction:column;">
        <header>
            <div class="caja-badge">CAJA: <span id="totalCaja">0.00</span>€</div>
            <button onclick="location.reload()" style="background:transparent; color:white; border:none; cursor:pointer;">Salir</button>
        </header>

        <div class="app-layout">
            <section class="productos-section">
                <div class="action-bar">
                    <button onclick="abrir('modal-retirar')" style="background:var(--danger); color:white; flex:1; border:none; border-radius:8px; cursor:pointer;">💸 Retiro</button>
                    <button onclick="abrir('modal-historial')" style="background:var(--info); color:white; flex:1; border:none; border-radius:8px; cursor:pointer;">📊 Historial</button>
                    <button onclick="abrirModStock()" style="background:var(--primary); color:white; flex:1; border:none; border-radius:8px; cursor:pointer;">📦 +Stock</button>
                    <button onclick="abrir('modal-nuevo-prod')" style="background:var(--primary); color:white; width:45px; border:none; border-radius:8px; cursor:pointer;">★</button>
                </div>
                <div id="productos-grid" class="grid-productos"></div>
            </section>

            <section class="ticket-section">
                <div class="ticket-header">TICKET ACTUAL</div>
                <div id="ticket-list" class="ticket-list"></div>
                <div class="ticket-footer">
                    <div class="total-pagar"><span id="ticket-total">0.00</span>€</div>
                    <button id="btn-cobrar" class="btn-cobrar">COBRAR Y FINALIZAR</button>
                    <button onclick="limpiarTicket()" style="background:#ccc; width:100%; margin-top:10px; padding:8px; border:none; border-radius:8px; cursor:pointer;">VACIAR TICKET</button>
                </div>
            </section>
        </div>
    </div>

    <div id="modal-cantidad" class="modal hidden">
        <div class="modal-content" style="max-width: 250px">
            <h3 id="cant-nombre">Producto</h3>
            <p>Cantidad vendida:</p>
            <input type="number" id="input-cantidad" value="1" min="1">
            <button onclick="agregarAlTicket()" style="background:var(--accent); color:white; width:100%; padding:15px; border:none; border-radius:8px; cursor:pointer;">AÑADIR</button>
            <button onclick="cerrar('modal-cantidad')" style="background:#95a5a6; color:white; width:100%; margin-top:10px; padding:10px; border:none; border-radius:8px; cursor:pointer;">CANCELAR</button>
        </div>
    </div>

    <div id="modal-add-stock" class="modal hidden">
        <div class="modal-content">
            <h3>Reponer Unidades</h3>
            <p style="font-size:0.8rem; color:#666">Haz clic en el producto para añadir stock:</p>
            <div id="lista-para-stock" style="text-align:left"></div>
            <button onclick="cerrar('modal-add-stock')" style="margin-top:20px; padding:10px; border-radius:8px; border:none; cursor:pointer;">CERRAR</button>
        </div>
    </div>

    <div id="modal-stock-manual" class="modal hidden">
        <div class="modal-content" style="max-width:280px">
            <h3 id="stock-nombre-manual"></h3>
            <p>¿Cuántas unidades nuevas entran?</p>
            <input type="number" id="input-stock-cantidad" value="24" min="1">
            <button onclick="finalizarCargaStock()" style="background:var(--accent); color:white; width:100%; padding:15px; border:none; border-radius:8px; cursor:pointer;">ACTUALIZAR STOCK</button>
            <button onclick="cerrar('modal-stock-manual')" style="background:#95a5a6; color:white; width:100%; margin-top:10px; padding:10px; border:none; border-radius:8px; cursor:pointer;">VOLVER</button>
        </div>
    </div>

    <div id="modal-nuevo-prod" class="modal hidden">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input type="text" id="newN" placeholder="Nombre">
            <input type="number" id="newP" placeholder="Precio" step="0.01">
            <input type="text" id="newI" placeholder="URL Imagen">
            <button onclick="guardarNuevo()" class="btn-cobrar" style="border:none;">GUARDAR</button>
            <button onclick="cerrar('modal-nuevo-prod')" style="margin-top:10px; background:none; border:none; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt5Ldo_-62A82ZmsxP5nB87LsefAPIxR0",
            authDomain: "control-de-caja-41341.firebaseapp.com",
            projectId: "control-de-caja-41341",
            storageBucket: "control-de-caja-41341.firebasestorage.app",
            messagingSenderId: "802067725052",
            appId: "1:802067725052:web:a583fab3a16d4f8025f579"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let ticket = [];
        let productosData = [];
        let pActual = null;
        let vTotal = 0, rTotal = 0;

        window.abrir = id => document.getElementById(id).classList.remove("hidden");
        window.cerrar = id => document.getElementById(id).classList.add("hidden");

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value).catch(e => alert("Error: " + e.message));
        };

        onAuthStateChanged(auth, user => { if(user) { cerrar("login-section"); abrir("app-section"); iniciar(); } });

        function iniciar() {
            onSnapshot(collection(db, "productos"), snap => {
                const g = document.getElementById("productos-grid"); g.innerHTML = "";
                productosData = [];
                snap.forEach(d => {
                    const p = d.data();
                    productosData.push({id: d.id, ...p});
                    const card = document.createElement("div");
                    card.className = "producto-card";
                    card.innerHTML = `
                        <div class="btn-delete-card" onclick="event.stopPropagation(); borrarP('${d.id}')">✖</div>
                        <span class="stock-tag">${p.stock || 0}</span>
                        <img src="${p.img || 'https://cdn-icons-png.flaticon.com/512/3121/3121784.png'}">
                        <div style="font-size:0.8rem; font-weight:bold">${d.id}</div>
                        <div style="color:var(--accent); font-weight:900">${Number(p.precio).toFixed(2)}€</div>
                    `;
                    card.onclick = () => {
                        pActual = { id: d.id, precio: p.precio };
                        document.getElementById("cant-nombre").innerText = d.id;
                        document.getElementById("input-cantidad").value = 1;
                        abrir("modal-cantidad");
                    };
                    g.appendChild(card);
                });
            });

            onSnapshot(collection(db, "ventas"), s => { vTotal = 0; s.forEach(d => vTotal += d.data().total); actCaja(); });
            onSnapshot(collection(db, "retiradas"), s => { rTotal = 0; s.forEach(d => rTotal += d.data().cantidad); actCaja(); });
        }

        // --- GESTIÓN STOCK MANUAL ---
        window.abrirModStock = () => {
            const l = document.getElementById("lista-para-stock"); l.innerHTML = "";
            productosData.forEach(p => {
                l.innerHTML += `<div onclick="prepararStockManual('${p.id}')" style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; cursor:pointer;">
                    <strong>${p.id}</strong> 
                    <span>Actual: ${p.stock || 0} > <span style="color:var(--info)">+ añadir</span></span>
                </div>`;
            });
            abrir("modal-add-stock");
        };

        window.prepararStockManual = (id) => {
            pActual = { id: id };
            document.getElementById("stock-nombre-manual").innerText = id;
            document.getElementById("input-stock-cantidad").value = 24;
            cerrar("modal-add-stock");
            abrir("modal-stock-manual");
        };

        window.finalizarCargaStock = async () => {
            const cant = parseInt(document.getElementById("input-stock-cantidad").value);
            if(isNaN(cant) || cant < 1) return;
            await updateDoc(doc(db, "productos", pActual.id), { stock: increment(cant) });
            cerrar("modal-stock-manual");
            alert("Stock actualizado: " + pActual.id + " +" + cant);
        };

        // --- TICKET Y COBRO ---
        window.agregarAlTicket = () => {
            const cant = parseInt(document.getElementById("input-cantidad").value);
            if(!cant || cant < 1) return;
            const idx = ticket.findIndex(item => item.id === pActual.id);
            if(idx >= 0) ticket[idx].cantidad += cant;
            else ticket.push({ id: pActual.id, cantidad: cant, precio: pActual.precio });
            cerrar("modal-cantidad");
            dibujarTicket();
        };

        function dibujarTicket() {
            const lista = document.getElementById("ticket-list"); lista.innerHTML = "";
            let suma = 0;
            ticket.forEach((item, index) => {
                const totalItem = item.cantidad * item.precio;
                suma += totalItem;
                lista.innerHTML += `<div class="ticket-item">
                    <span><b>${item.cantidad}x</b> ${item.id}</span>
                    <span>${totalItem.toFixed(2)}€ <button onclick="quitar(${index})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold">X</button></span>
                </div>`;
            });
            document.getElementById("ticket-total").innerText = suma.toFixed(2);
        }

        window.quitar = (i) => { ticket.splice(i,1); dibujarTicket(); };
        window.limpiarTicket = () => { ticket = []; dibujarTicket(); };

        document.getElementById("btn-cobrar").onclick = async () => {
            if(ticket.length === 0) return;
            const btn = document.getElementById("btn-cobrar");
            btn.innerText = "PROCESANDO..."; btn.disabled = true;
            try {
                for (const item of ticket) {
                    await updateDoc(doc(db, "productos", item.id), { stock: increment(-item.cantidad) });
                    await addDoc(collection(db, "ventas"), {
                        producto: item.id, cantidad: item.cantidad, total: item.cantidad * item.precio, fecha: new Date().toISOString()
                    });
                }
                limpiarTicket();
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.innerText = "COBRAR Y FINALIZAR"; btn.disabled = false; }
        };

        window.borrarP = async (id) => { if(confirm("¿Borrar " + id + "?")) await deleteDoc(doc(db, "productos", id)); };
        
        window.guardarNuevo = async () => {
            const n = document.getElementById("newN").value, p = parseFloat(document.getElementById("newP").value), i = document.getElementById("newI").value;
            if(!n || isNaN(p)) return;
            await setDoc(doc(db, "productos", n), { precio: p, stock: 0, img: i });
            cerrar("modal-nuevo-prod");
        };

        function actCaja() { document.getElementById("totalCaja").innerText = (vTotal - rTotal).toFixed(2); }
    </script>
</body>
</html>
