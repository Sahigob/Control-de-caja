<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Asociación - Historial Completo</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        
        header { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .caja-badge { background: white; color: var(--primary); padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 1.5rem; border: 2px solid var(--accent); }

        .main-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px 18px; transition: 0.2s; }
        .btn-retirar { background: var(--danger); color: white; flex: 1; }
        .btn-historial { background: var(--info); color: white; flex: 1; }
        .btn-add { background: var(--primary); color: white; width: 50px; font-size: 1.5rem; }

        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .producto-card { background: white; border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #ddd; cursor: pointer; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .producto-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .stock-tag { position: absolute; top: 10px; right: 10px; background: #eee; padding: 4px 8px; border-radius: 10px; font-size: 0.8rem; }

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 95%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f4f4f4; color: var(--primary); }
        .text-danger { color: var(--danger); font-weight: bold; }
        .text-success { color: var(--accent); font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-confirm { background: var(--accent); color: white; width: 100%; padding: 15px; margin-top: 10px; }
        .btn-close { background: #95a5a6; color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" style="display:flex; justify-content:center; align-items:center; height:100vh; background:var(--primary);">
        <div style="background:white; padding:40px; border-radius:20px; width:300px; text-align:center;">
            <h2>Asociación</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="loginBtn" style="background: var(--accent); color:white; width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <header>
            <div class="caja-badge">CAJA: <span id="totalCaja">0.00</span>€</div>
            <button onclick="location.reload()" style="color:white; background:transparent">Salir</button>
        </header>

        <div class="main-container">
            <div class="action-bar">
                <button class="btn-retirar" onclick="abrir('modal-retirar')">💸 RETIRAR DINERO</button>
                <button class="btn-historial" onclick="abrir('modal-historial')">📊 MOVIMIENTOS</button>
                <button class="btn-add" onclick="abrir('modal-producto')">+</button>
            </div>
            <div id="productos-grid" class="grid-productos"></div>
        </div>
    </div>

    <div id="modal-venta" class="modal hidden">
        <div class="modal-content" style="max-width:350px">
            <h2 id="ventaTitulo">Producto</h2>
            <input type="number" id="ventaCantidad" value="1" min="1">
            <button class="btn-confirm" id="btnConfirmarVenta">CONFIRMAR VENTA</button>
            <button class="btn-close" onclick="cerrar('modal-venta')">CANCELAR</button>
        </div>
    </div>

    <div id="modal-historial" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Historial de Movimientos</h2>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button onclick="verTab('ventas')" id="tabV" style="background:var(--accent); color:white">Ventas</button>
                <button onclick="verTab('retiradas')" id="tabR" style="background:#ddd">Retiradas</button>
            </div>
            
            <div id="cont-ventas">
                <table>
                    <thead><tr><th>Fecha/Hora</th><th>Prod.</th><th>Cant.</th><th>Total</th></tr></thead>
                    <tbody id="lista-ventas"></tbody>
                </table>
            </div>
            
            <div id="cont-retiradas" class="hidden">
                <table>
                    <thead><tr><th>Fecha/Hora</th><th>Nombre</th><th>Cantidad</th></tr></thead>
                    <tbody id="lista-retiradas"></tbody>
                </table>
            </div>
            
            <button class="btn-close" onclick="cerrar('modal-historial')">CERRAR</button>
        </div>
    </div>

    <div id="modal-retirar" class="modal hidden">
        <div class="modal-content" style="max-width:350px">
            <h2>Retirar de Caja</h2>
            <input type="text" id="retNombre" placeholder="Nombre">
            <input type="number" id="retCantidad" placeholder="Euros €" step="0.01">
            <button class="btn-confirm" id="btnConfirmarRetirada">CONFIRMAR SALIDA</button>
            <button class="btn-close" onclick="cerrar('modal-retirar')">VOLVER</button>
        </div>
    </div>

    <div id="modal-producto" class="modal hidden">
        <div class="modal-content" style="max-width:350px">
            <h2>Nuevo Artículo</h2>
            <input type="text" id="newNombre" placeholder="Nombre">
            <input type="number" id="newPrecio" placeholder="Precio €">
            <input type="number" id="newStock" placeholder="Stock">
            <button class="btn-confirm" id="btnGuardarProducto">GUARDAR</button>
            <button class="btn-close" onclick="cerrar('modal-producto')">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, onSnapshot, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt5Ldo_-62A82ZmsxP5nB87LsefAPIxR0",
            authDomain: "control-de-caja-41341.firebaseapp.com",
            projectId: "control-de-caja-41341",
            storageBucket: "control-de-caja-41341.firebasestorage.app",
            messagingSenderId: "802067725052",
            appId: "1:802067725052:web:a583fab3a16d4f8025f579"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let vTot = 0, rTot = 0, pSel = null;

        window.abrir = id => document.getElementById(id).classList.remove("hidden");
        window.cerrar = id => document.getElementById(id).classList.add("hidden");
        
        window.verTab = t => {
            if(t === 'ventas') {
                abrir('cont-ventas'); cerrar('cont-retiradas');
                document.getElementById('tabV').style.background = 'var(--accent)'; document.getElementById('tabR').style.background = '#ddd';
            } else {
                abrir('cont-retiradas'); cerrar('cont-ventas');
                document.getElementById('tabR').style.background = 'var(--danger)'; document.getElementById('tabV').style.background = '#ddd';
            }
        };

        document.getElementById("loginBtn").onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value).catch(e => alert(e.message));
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                cerrar("login-section"); abrir("app-section");
                iniciar();
            }
        });

        function formatearFecha(iso) {
            const d = new Date(iso);
            return new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }).format(d);
        }

        function iniciar() {
            onSnapshot(collection(db, "productos"), snap => {
                const g = document.getElementById("productos-grid"); g.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement("div");
                    div.className = "producto-card";
                    div.innerHTML = `<span class="stock-tag">Stock: ${p.stock || 0}</span><img src="https://cdn-icons-png.flaticon.com/512/3121/3121784.png"><h3>${d.id}</h3><div class="precio">${Number(p.precio).toFixed(2)}€</div>`;
                    div.onclick = () => {
                        pSel = { id: d.id, precio: p.precio };
                        document.getElementById("ventaTitulo").innerText = d.id;
                        abrir("modal-venta");
                    };
                    g.appendChild(div);
                });
            });

            // ESCUCHAR VENTAS E HISTORIAL
            const qVentas = query(collection(db, "ventas"), orderBy("fecha", "desc"));
            onSnapshot(qVentas, s => {
                vTot = 0;
                const lista = document.getElementById("lista-ventas"); lista.innerHTML = "";
                s.forEach(d => {
                    const v = d.data();
                    vTot += v.total;
                    lista.innerHTML += `<tr><td>${formatearFecha(v.fecha)}</td><td>${v.producto}</td><td>${v.cantidad}</td><td class="text-success">${Number(v.total).toFixed(2)}€</td></tr>`;
                });
                actCaja();
            });

            // ESCUCHAR RETIRADAS E HISTORIAL
            const qRet = query(collection(db, "retiradas"), orderBy("fecha", "desc"));
            onSnapshot(qRet, s => {
                rTot = 0;
                const lista = document.getElementById("lista-retiradas"); lista.innerHTML = "";
                s.forEach(d => {
                    const r = d.data();
                    rTot += r.cantidad;
                    lista.innerHTML += `<tr><td>${formatearFecha(r.fecha)}</td><td>${r.nombre}</td><td class="text-danger">-${Number(r.cantidad).toFixed(2)}€</td></tr>`;
                });
                actCaja();
            });
        }

        document.getElementById("btnConfirmarVenta").onclick = async () => {
            const c = parseInt(document.getElementById("ventaCantidad").value);
            if(!c || c < 1) return;
            cerrar("modal-venta");
            await updateDoc(doc(db, "productos", pSel.id), { stock: increment(-c) });
            await addDoc(collection(db, "ventas"), { 
                producto: pSel.id, cantidad: c, total: pSel.precio * c, fecha: new Date().toISOString() 
            });
        };

        document.getElementById("btnConfirmarRetirada").onclick = async () => {
            const n = document.getElementById("retNombre").value;
            const c = parseFloat(document.getElementById("retCantidad").value);
            if(!n || !c) return;
            cerrar("modal-retirar");
            await addDoc(collection(db, "retiradas"), { 
                nombre: n, cantidad: c, fecha: new Date().toISOString() 
            });
        };

        document.getElementById("btnGuardarProducto").onclick = async () => {
            const n = document.getElementById("newNombre").value;
            const p = parseFloat(document.getElementById("newPrecio").value);
            const s = parseInt(document.getElementById("newStock").value);
            if(!n || isNaN(p)) return;
            cerrar("modal-producto");
            await setDoc(doc(db, "productos", n), { precio: p, stock: s || 0 });
        };

        function actCaja() { document.getElementById("totalCaja").innerText = (vTot - rTot).toFixed(2); }
    </script>
</body>
</html>
