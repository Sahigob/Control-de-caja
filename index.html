<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPV Asociación - Visual</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f1f2f6; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .hidden { display: none !important; }
        header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .caja-badge { background: white; color: var(--primary); padding: 5px 12px; border-radius: 15px; font-weight: bold; border: 2px solid var(--accent); }

        .app-layout { display: flex; flex: 1; overflow: hidden; }
        
        .productos-section { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        
        .action-bar { display: grid; grid-template-columns: 1.5fr 1fr 1fr 45px; gap: 8px; margin-bottom: 12px; }
        .action-bar button { padding: 10px; font-size: 0.7rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; }

        .category-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; min-height: 45px; }
        .category-bar button { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; font-size: 0.8rem; }
        .category-bar button.active { background: var(--warning); color: white; border-color: var(--warning); }

        .grid-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        
        .producto-card { background: white; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #ddd; position: relative; cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 140px; }
        .producto-card:active { transform: scale(0.95); background: #f9f9f9; }
        .producto-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 5px; }
        .stock-tag { position: absolute; top: 5px; left: 5px; background: rgba(238, 238, 238, 0.9); padding: 2px 5px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; border: 1px solid #ccc; }

        .ticket-section { width: 320px; background: white; border-left: 2px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        .ticket-list { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.9rem; }
        .ticket-footer { padding: 15px; background: #f9f9f9; border-top: 1px solid #ddd; }
        .total-pagar { font-size: 2.2rem; font-weight: 900; text-align: center; color: var(--primary); margin-bottom: 10px; }
        .btn-cobrar { background: var(--accent); color: white; width: 100%; padding: 18px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; border: none; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px !important; }

        @media (max-width: 768px) {
            .app-layout { flex-direction: column; overflow-y: auto; }
            .ticket-section { width: 100%; border-left: none; height: auto; border-top: 2px solid #ddd; }
            .grid-container { overflow-y: visible; }
        }
    </style>
</head>
<body>

    <div id="login-section" class="modal">
        <div class="modal-content" style="max-width:300px; text-align:center;">
            <h2>Acceso TPV</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <header>
            <div class="caja-badge">CAJA: <span id="totalCaja">0.00</span>€</div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;">Cerrar Sesión</button>
        </header>

        <div class="app-layout">
            <section class="productos-section">
                <div class="action-bar">
                    <button onclick="abrir('modal-retirar')" style="background:var(--danger)">💸 RETIRADA DE CAJA</button>
                    <button onclick="abrirHistorial()" style="background:var(--info)">📊 HIST.</button>
                    <button onclick="abrirModStock()" style="background:var(--primary)">📦 STOCK</button>
                    <button onclick="abrir('modal-nuevo-prod')" style="background:var(--primary)">★</button>
                </div>

                <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar artículo..." onkeyup="renderizarProductos()">

                <div class="category-bar">
                    <button onclick="filtrar('Todos')" class="active btn-cat">TODOS</button>
                    <button onclick="filtrar('Refrescos')" class="btn-cat">REFRESCOS</button>
                    <button onclick="filtrar('Cervezas')" class="btn-cat">CERVEZAS</button>
                    <button onclick="filtrar('Cubatas')" class="btn-cat">CUBATAS</button>
                    <button onclick="filtrar('Snacks')" class="btn-cat">SNACKS</button>
                </div>

                <div class="grid-container">
                    <div id="productos-grid" class="grid-productos"></div>
                </div>
            </section>

            <section class="ticket-section">
                <div id="ticket-list" class="ticket-list"></div>
                <div class="ticket-footer">
                    <div class="total-pagar"><span id="ticket-total">0.00</span>€</div>
                    <button id="btn-cobrar" class="btn-cobrar">COBRAR VENTA</button>
                    <button onclick="limpiarTicket()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Vaciar Ticket</button>
                </div>
            </section>
        </div>
    </div>

    <div id="modal-nuevo-prod" class="modal hidden">
        <div class="modal-content">
            <h3>Nuevo Artículo</h3>
            <input type="text" id="newN" placeholder="Nombre exacto">
            <input type="number" id="newP" placeholder="Precio venta €" step="0.01">
            <select id="newC">
                <option value="Refrescos">Refrescos</option>
                <option value="Cervezas">Cervezas</option>
                <option value="Cubatas">Cubatas</option>
                <option value="Snacks">Snacks</option>
            </select>
            <input type="text" id="newI" placeholder="URL de la imagen (opcional)">
            <button onclick="guardarNuevo()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">CREAR</button>
            <button onclick="cerrar('modal-nuevo-prod')" style="width:100%; background:none; border:none; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <div id="modal-add-stock" class="modal hidden"><div class="modal-content"><h3>Inventario</h3><input type="text" id="searchStock" placeholder="Buscar..." onkeyup="abrirModStock()"><div id="lista-para-stock"></div><button onclick="cerrar('modal-add-stock')" style="width:100%; padding:10px; background:#eee; border:none; border-radius:8px; margin-top:10px;">CERRAR</button></div></div>
    <div id="modal-cantidad" class="modal hidden"><div class="modal-content" style="text-align:center;"><h3 id="cant-nombre"></h3><input type="number" id="input-cantidad" value="1"><button onclick="agregarAlTicket()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">AÑADIR</button><button onclick="cerrar('modal-cantidad')" style="width:100%; background:none; border:none; margin-top:10px;">Cancelar</button></div></div>
    <div id="modal-retirar" class="modal hidden"><div class="modal-content"><h3>Retirada de Caja</h3><input type="text" id="retNombre" placeholder="Concepto"><input type="number" id="retCantidad" placeholder="Importe €"><button onclick="ejecutarRetiro()" style="width:100%; padding:15px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">CONFIRMAR</button><button onclick="cerrar('modal-retirar')" style="width:100%; background:none; border:none; margin-top:10px;">Cancelar</button></div></div>
    <div id="modal-historial" class="modal hidden"><div class="modal-content"><h3>Resumen Hoy</h3><div id="lista-historial-render"></div><button onclick="cerrar('modal-historial')" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; margin-top:10px;">CERRAR</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, increment, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDt5Ldo_-62A82ZmsxP5nB87LsefAPIxR0", authDomain: "control-de-caja-41341.firebaseapp.com", projectId: "control-de-caja-41341", storageBucket: "control-de-caja-41341.firebasestorage.app", messagingSenderId: "802067725052", appId: "1:802067725052:web:a583fab3a16d4f8025f579" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const RECETAS = {
            "Whisky Cola": { "Whisky": 0.066, "Coca Cola": 1 },
            "Whisky Naranja": { "Whisky": 0.066, "Fanta de Naranja": 1 },
            "Whisky Limon": { "Whisky": 0.066, "Fanta de Limón": 1 },
            "Gin Tonic": { "Ginebra": 0.066, "Tónica": 1 }
        };

        const ICONOS_DEFECTO = {
            "Refrescos": "https://cdn-icons-png.flaticon.com/512/2722/2722527.png",
            "Cervezas": "https://cdn-icons-png.flaticon.com/512/931/931949.png",
            "Cubatas": "https://cdn-icons-png.flaticon.com/512/920/920605.png",
            "Snacks": "https://cdn-icons-png.flaticon.com/512/2553/2553691.png"
        };

        let ticket = [], productosData = [], pActual = null, vTotal = 0, rTotal = 0, catActual = "Todos", ventasHoy = [], retirosHoy = [];

        window.abrir = id => document.getElementById(id).classList.remove("hidden");
        window.cerrar = id => document.getElementById(id).classList.add("hidden");
        
        window.login = () => {
            const e = document.getElementById("email").value, p = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error Acceso"));
        };

        onAuthStateChanged(auth, user => { if(user) { cerrar("login-section"); abrir("app-section"); iniciar(); } });

        function iniciar() {
            onSnapshot(collection(db, "productos"), snap => {
                productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()}));
                renderizarProductos();
            });
            onSnapshot(query(collection(db, "ventas"), limit(100)), s => {
                vTotal = 0; s.forEach(d => vTotal += (Number(d.data().total) || 0)); actCaja();
            });
            onSnapshot(query(collection(db, "retiradas"), limit(100)), s => {
                rTotal = 0; s.forEach(d => rTotal += (Number(d.data().cantidad) || 0)); actCaja();
            });
        }

        window.filtrar = (cat) => {
            catActual = cat;
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.toggle('active', b.innerText === cat.toUpperCase()));
            renderizarProductos();
        };

        window.renderizarProductos = () => {
            const g = document.getElementById("productos-grid"); g.innerHTML = "";
            const bus = document.getElementById("buscador").value.toLowerCase();
            const fil = productosData.filter(p => (catActual === "Todos" || p.categoria === catActual) && p.id.toLowerCase().includes(bus));
            
            fil.forEach(p => {
                const imgUrl = p.img || ICONOS_DEFECTO[p.categoria] || ICONOS_DEFECTO["Refrescos"];
                const card = document.createElement("div"); card.className = "producto-card";
                card.innerHTML = `<span class="stock-tag">${(Number(p.stock)||0).toFixed(1)}</span>
                    <img src="${imgUrl}" onerror="this.src='${ICONOS_DEFECTO["Refrescos"]}'">
                    <div style="font-weight:bold; font-size:0.75rem;">${p.id}</div>
                    <div style="color:var(--accent); font-weight:bold;">${(Number(p.precio)||0).toFixed(2)}€</div>`;
                card.onclick = () => { pActual = { id: p.id, precio: p.precio }; document.getElementById("cant-nombre").innerText = p.id; abrir("modal-cantidad"); };
                g.appendChild(card);
            });
        };

        window.agregarAlTicket = () => {
            const cant = parseInt(document.getElementById("input-cantidad").value) || 1;
            const idx = ticket.findIndex(it => it.id === pActual.id);
            if(idx >= 0) ticket[idx].cantidad += cant; else ticket.push({ ...pActual, cantidad: cant });
            cerrar("modal-cantidad"); dibujarTicket();
        };

        function dibujarTicket() {
            const l = document.getElementById("ticket-list"); l.innerHTML = ""; let s = 0;
            ticket.forEach((it) => { 
                const sub = it.cantidad * (Number(it.precio) || 0); s += sub;
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;"><span>${it.cantidad}x ${it.id}</span><span>${sub.toFixed(2)}€</span></div>`;
            });
            document.getElementById("ticket-total").innerText = s.toFixed(2);
        }

        window.limpiarTicket = () => { ticket = []; dibujarTicket(); };

        document.getElementById("btn-cobrar").onclick = async () => {
            if(ticket.length === 0) return;
            const btn = document.getElementById("btn-cobrar"); btn.disabled = true;
            for (const it of ticket) {
                const receta = RECETAS[it.id];
                if (receta) {
                    for (const [ing, cant] of Object.entries(receta)) {
                        await updateDoc(doc(db, "productos", ing), { stock: increment(-(cant * it.cantidad)) }).catch(e => console.log(e));
                    }
                } else {
                    await updateDoc(doc(db, "productos", it.id), { stock: increment(-it.cantidad) }).catch(e => console.log(e));
                }
                await addDoc(collection(db, "ventas"), { producto: it.id, cantidad: it.cantidad, total: (it.cantidad * Number(it.precio)), fecha: new Date().toISOString() });
            }
            limpiarTicket(); btn.disabled = false; alert("Venta OK");
        };

        window.abrirModStock = () => {
            const l = document.getElementById("lista-para-stock"); l.innerHTML = "";
            const bus = document.getElementById("searchStock").value.toLowerCase();
            productosData.filter(p => p.id.toLowerCase().includes(bus)).forEach(p => {
                l.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                    <span><b>${p.id}</b> (${(Number(p.stock)||0).toFixed(2)})</span>
                    <div>
                        <button onclick="editStock('${p.id}')" style="background:var(--info); color:white; border:none; padding:8px; border-radius:5px;">STOCK</button>
                        <button onclick="borrarP('${p.id}')" style="background:var(--danger); color:white; border:none; padding:8px; border-radius:5px; margin-left:5px;">X</button>
                    </div>
                </div>`;
            });
            abrir("modal-add-stock");
        };

        window.editStock = async (id) => { const n = prompt("Añadir cantidad:"); if(n) await updateDoc(doc(db, "productos", id), { stock: increment(parseFloat(n)) }); };
        window.borrarP = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "productos", id)); };
        window.ejecutarRetiro = async () => {
            const n = document.getElementById("retNombre").value, c = parseFloat(document.getElementById("retCantidad").value);
            if(n && c) { await addDoc(collection(db, "retiradas"), { nombre: n, cantidad: c, fecha: new Date().toISOString() }); cerrar("modal-retirar"); }
        };
        window.guardarNuevo = async () => {
            const n = document.getElementById("newN").value, p = parseFloat(document.getElementById("newP").value), c = document.getElementById("newC").value, i = document.getElementById("newI").value;
            if(n && p) { await setDoc(doc(db, "productos", n), { precio: p, stock: 0, categoria: c, img: i || "" }); cerrar("modal-nuevo-prod"); }
        };
        function actCaja() { document.getElementById("totalCaja").innerText = (vTotal - rTotal).toFixed(2); }
        window.abrirHistorial = () => {
            let h = ""; ventasHoy.forEach(v => h += `<div>${v.producto} (${v.total.toFixed(2)}€)</div>`);
            document.getElementById("lista-historial-render").innerHTML = h || "Sin ventas"; abrir("modal-historial");
        };
    </script>
</body>
</html>
