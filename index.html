<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caja Asociación</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #login { border: 1px solid #333; padding: 20px; width: 300px; }
    #productos { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .producto { border: 1px solid #555; padding: 10px; width: 120px; text-align: center; }
    button { margin: 5px 0; width: 100%; }
  </style>
</head>
<body>
  <h1>Caja Asociación</h1>

  <!-- Login -->
  <div id="login">
    <h2>Iniciar sesión</h2>
    <input type="email" id="email" placeholder="Correo" style="width:100%; margin-bottom:10px;">
    <input type="password" id="password" placeholder="Contraseña" style="width:100%; margin-bottom:10px;">
    <button id="loginBtn">Entrar</button>
    <button id="registerBtn">Registrarse</button>
  </div>

  <!-- App principal -->
  <div id="app" style="display:none; margin-top:20px;">
    <h2>Productos</h2>
    <div id="productos"></div>

    <h2>Total en caja: €<span id="totalCaja">0</span></h2>

    <h2>Historial de ventas</h2>
    <ul id="historial"></ul>

    <h2>Retirar dinero</h2>
    <input type="text" id="nombreRetirada" placeholder="Nombre">
    <input type="number" id="cantidadRetirada" placeholder="Cantidad">
    <button id="retirarBtn">Retirar</button>

    <h3>Historial de retiradas</h3>
    <ul id="historialRetiradas"></ul>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
