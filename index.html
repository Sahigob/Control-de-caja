<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Asociación - Gestión Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .hidden { display: none !important; }
        
        header { background: var(--primary); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .caja-badge { background: white; color: var(--primary); padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 1.4rem; border: 2px solid var(--accent); }

        .main-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .action-bar { display: flex; gap: 10px; margin-bottom: 25px; }
        
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px 15px; transition: 0.2s; }
        .btn-retirar { background: var(--danger); color: white; flex: 1; }
        .btn-historial { background: var(--info); color: white; flex: 1; }
        .btn-add-stock { background: var(--accent); color: white; flex: 1; }
        .btn-new-prod { background: var(--primary); color: white; width: 45px; font-size: 1.2rem; }

        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .producto-card { background: white; border-radius: 18px; padding: 20px; text-align: center; border: 1px solid #ddd; cursor: pointer; position: relative; }
        .producto-card img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .stock-tag { position: absolute; top: 10px; left: 10px; background: #eee; padding: 4px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        
        /* BOTÓN ELIMINAR EN TARJETA */
        .btn-delete-card { position: absolute; top: 8px; right: 8px; background: #ff444422; color: #ff4444; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.2s; }
        .btn-delete-card:hover { background: var(--danger); color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .list-item-stock { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-confirm { background: var(--accent); color: white; width: 100%; padding: 15px; margin-top: 10px; font-size: 1.1rem; }
        .btn-close { background: #95a5a6; color: white; width: 100%; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="login-section" style="display:flex; justify-content:center; align-items:center; height:100vh; background:var(--primary);">
        <div style="background:white; padding:40px; border-radius:20px; width:280px; text-align:center;">
            <h2 style="margin-top:0">TPV Acceso</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="loginBtn" style="background: var(--accent); color:white; width:100%; font-size:1.1rem">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <header>
            <div class="caja-badge"><span id="totalCaja">0.00</span>€</div>
            <button onclick="location.reload()" style="color:white; background:transparent; font-size:0.8rem">SALIR</button>
        </header>

        <div class="main-container">
            <div class="action-bar">
                <button class="btn-retirar" onclick="abrir('modal-retirar')">💸 RETIRAR</button>
                <button class="btn-historial" onclick="abrir('modal-historial')">📊 MOVIMS.</button>
                <button class="btn-add-stock" onclick="abrirModStock()">📦 +STOCK</button>
                <button class="btn-new-prod" onclick="abrir('modal-nuevo-prod')" title="Crear Producto Nuevo">★</button>
            </div>
            <div id="productos-grid" class="grid-productos"></div>
        </div>
    </div>

    <div id="modal-venta" class="modal hidden">
        <div class="modal-content" style="max-width:320px">
            <h2 id="ventaTitulo" style="margin-top:0">Venta</h2>
            <input type="number" id="ventaCantidad" value="1" min="1">
            <button class="btn-confirm" id="btnConfirmarVenta">VENDER</button>
            <button class="btn-close" onclick="cerrar('modal-venta')">CANCELAR</button>
        </div>
    </div>

    <div id="modal-add-stock" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Reponer Almacén</h2>
            <p style="font-size:0.9rem; color:#666">Selecciona el producto que ha llegado:</p>
            <div id="lista-para-stock"></div>
            <button class="btn-close" onclick="cerrar('modal-add-stock')">CERRAR</button>
        </div>
    </div>

    <div id="modal-confirmar-stock" class="modal hidden">
        <div class="modal-content" style="max-width:320px">
            <h3 id="stockNombreLabel"></h3>
            <p>¿Cuántas unidades nuevas entran?</p>
            <input type="number" id="inputSumaStock" value="24">
            <button class="btn-confirm" id="btnFinalizarStock">AÑADIR AL STOCK</button>
            <button class="btn-close" onclick="cerrar('modal-confirmar-stock')">VOLVER</button>
        </div>
    </div>

    <div id="modal-nuevo-prod" class="modal hidden">
        <div class="modal-content" style="max-width:350px">
            <h2 style="margin-top:0">Crear Nuevo Producto</h2>
            <input type="text" id="newNombre" placeholder="Nombre">
            <input type="number" id="newPrecio" placeholder="Precio €" step="0.01">
            <input type="text" id="newImg" placeholder="URL Foto">
            <button class="btn-confirm" id="btnGuardarNuevo">CREAR PRODUCTO</button>
            <button class="btn-close" onclick="cerrar('modal-nuevo-prod')">CANCELAR</button>
        </div>
    </div>

    <div id="modal-historial" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Historial</h2>
            <div style="display:flex; gap:5px; margin-bottom:10px">
                <button onclick="verTab('V')" id="tV" style="flex:1; background:var(--accent); color:white">Ventas</button>
                <button onclick="verTab('R')" id="tR" style="flex:1; background:#ddd">Retiradas</button>
            </div>
            <div id="cV"><table><thead><tr><th>Hora</th><th>Prod.</th><th>€</th></tr></thead><tbody id="lV"></tbody></table></div>
            <div id="cR" class="hidden"><table><thead><tr><th>Hora</th><th>Nombre</th><th>€</th></tr></thead><tbody id="lR"></tbody></table></div>
            <button class="btn-close" onclick="cerrar('modal-historial')">CERRAR</button>
        </div>
    </div>

    <div id="modal-retirar" class="modal hidden">
        <div class="modal-content" style="max-width:320px">
            <h2>Salida de Caja</h2>
            <input type="text" id="retNom" placeholder="Nombre">
            <input type="number" id="retCant" placeholder="Cantidad €">
            <button class="btn-confirm" id="btnRetiro">CONFIRMAR</button>
            <button class="btn-close" onclick="cerrar('modal-retirar')">VOLVER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt5Ldo_-62A82ZmsxP5nB87LsefAPIxR0",
            authDomain: "control-de-caja-41341.firebaseapp.com",
            projectId: "control-de-caja-41341",
            storageBucket: "control-de-caja-41341.firebasestorage.app",
            messagingSenderId: "802067725052",
            appId: "1:802067725052:web:a583fab3a16d4f8025f579"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let vT = 0, rT = 0, pS = null, listadoProds = [];

        window.abrir = id => document.getElementById(id).classList.remove("hidden");
        window.cerrar = id => document.getElementById(id).classList.add("hidden");

        document.getElementById("loginBtn").onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value).catch(e => alert(e.message));
        };

        onAuthStateChanged(auth, user => { if(user) { cerrar("login-section"); abrir("app-section"); iniciar(); } });

        function iniciar() {
            onSnapshot(collection(db, "productos"), snap => {
                const g = document.getElementById("productos-grid"); g.innerHTML = "";
                listadoProds = [];
                snap.forEach(d => {
                    const p = d.data();
                    listadoProds.push({id: d.id, ...p});
                    const div = document.createElement("div");
                    div.className = "producto-card";
                    div.innerHTML = `
                        <div class="btn-delete-card" onclick="borrarProducto(event, '${d.id}')">✖</div>
                        <span class="stock-tag">Stock: ${p.stock || 0}</span>
                        <img src="${p.img || 'https://cdn-icons-png.flaticon.com/512/3121/3121784.png'}">
                        <h3>${d.id}</h3>
                        <div style="font-weight:bold; color:var(--accent)">${Number(p.precio).toFixed(2)}€</div>
                    `;
                    div.onclick = () => { pS = {id: d.id, precio: p.precio}; document.getElementById("ventaTitulo").innerText = d.id; abrir("modal-venta"); };
                    g.appendChild(div);
                });
            });

            const qV = query(collection(db, "ventas"), orderBy("fecha", "desc"));
            onSnapshot(qV, s => {
                vT = 0; const l = document.getElementById("lV"); l.innerHTML = "";
                s.forEach(d => { const v = d.data(); vT += v.total; l.innerHTML += `<tr><td>${v.fecha.split('T')[1].substring(0,5)}</td><td>${v.producto}</td><td>${v.total.toFixed(2)}€</td></tr>`; });
                act();
            });

            const qR = query(collection(db, "retiradas"), orderBy("fecha", "desc"));
            onSnapshot(qR, s => {
                rT = 0; const l = document.getElementById("lR"); l.innerHTML = "";
                s.forEach(d => { const r = d.data(); rT += r.cantidad; l.innerHTML += `<tr><td>${r.fecha.split('T')[1].substring(0,5)}</td><td>${r.nombre}</td><td>${r.cantidad.toFixed(2)}€</td></tr>`; });
                act();
            });
        }

        // FUNCIÓN BORRAR PRODUCTO
        window.borrarProducto = async (e, id) => {
            e.stopPropagation();
            if(confirm(`¿Seguro que quieres eliminar "${id}" para siempre?`)) {
                await deleteDoc(doc(db, "productos", id));
            }
        };

        // GESTIÓN DE STOCK SIN REESCRIBIR
        window.abrirModStock = () => {
            const cont = document.getElementById("lista-para-stock");
            cont.innerHTML = "";
            listadoProds.forEach(p => {
                cont.innerHTML += `
                    <div class="list-item-stock">
                        <span><strong>${p.id}</strong> (Actual: ${p.stock})</span>
                        <button onclick="prepararSuma('${p.id}')" style="background:var(--info); color:white; padding:5px 10px">+ Añadir</button>
                    </div>`;
            });
            abrir("modal-add-stock");
        };

        window.prepararSuma = id => {
            pS = {id: id};
            document.getElementById("stockNombreLabel").innerText = id;
            cerrar("modal-add-stock");
            abrir("modal-confirmar-stock");
        };

        document.getElementById("btnFinalizarStock").onclick = async () => {
            const n = parseInt(document.getElementById("inputSumaStock").value);
            if(isNaN(n)) return;
            await updateDoc(doc(db, "productos", pS.id), { stock: increment(n) });
            cerrar("modal-confirmar-stock");
        };

        // ACCIONES BÁSICAS
        document.getElementById("btnConfirmarVenta").onclick = async () => {
            const c = parseInt(document.getElementById("ventaCantidad").value);
            if(!c || c < 1) return;
            cerrar("modal-venta");
            await updateDoc(doc(db, "productos", pS.id), { stock: increment(-c) });
            await addDoc(collection(db, "ventas"), { producto: pS.id, cantidad: c, total: pS.precio * c, fecha: new Date().toISOString() });
        };

        document.getElementById("btnGuardarNuevo").onclick = async () => {
            const n = document.getElementById("newNombre").value, p = parseFloat(document.getElementById("newPrecio").value), i = document.getElementById("newImg").value;
            if(!n || isNaN(p)) return;
            cerrar("modal-nuevo-prod");
            await setDoc(doc(db, "productos", n), { precio: p, stock: 0, img: i || "" });
        };

        document.getElementById("btnRetiro").onclick = async () => {
            const n = document.getElementById("retNom").value, c = parseFloat(document.getElementById("retCant").value);
            if(!n || !c) return;
            cerrar("modal-retirar");
            await addDoc(collection(db, "retiradas"), { nombre: n, cantidad: c, fecha: new Date().toISOString() });
        };

        window.verTab = t => {
            if(t==='V'){ abrir('cV'); cerrar('cR'); document.getElementById('tV').style.background='var(--accent)'; document.getElementById('tR').style.background='#ddd'; }
            else { abrir('cR'); cerrar('cV'); document.getElementById('tR').style.background='var(--danger)'; document.getElementById('tV').style.background='#ddd'; }
        };

        function act() { document.getElementById("totalCaja").innerText = (vT - rT).toFixed(2); }
    </script>
</body>
</html>
