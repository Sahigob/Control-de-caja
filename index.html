<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caja Asociación con Stock</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Firebase SDK -->
  <script type="module" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body>
  <h1>Caja Asociación</h1>

  <!-- Login con correo/contraseña -->
  <div id="login">
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="loginBtn">Entrar</button>
    <button id="registerBtn">Registrarse</button>
  </div>

  <!-- App principal -->
  <div id="app" style="display:none;">
    <h2>Productos</h2>
    <div id="productos"></div>

    <h2>Total en caja: €<span id="totalCaja">0</span></h2>

    <h2>Historial de ventas</h2>
    <ul id="historial"></ul>

    <h2>Retirar dinero</h2>
    <input type="text" id="nombreRetirada" placeholder="Nombre">
    <input type="number" id="cantidadRetirada" placeholder="Cantidad">
    <button id="retirarBtn">Retirar</button>

    <h3>Historial de retiradas</h3>
    <ul id="historialRetiradas"></ul>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
