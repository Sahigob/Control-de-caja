<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Caja Asociación TPV</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Caja Asociación</h1>

<div id="login">
  <h2>Iniciar sesión</h2>
  <input type="email" id="email" placeholder="Correo"><br><br>
  <input type="password" id="password" placeholder="Contraseña"><br><br>
  <button id="loginBtn">Entrar</button>
  <button id="registerBtn">Registrarse</button>
</div>

<div id="app" style="display:none;">
  <div>
    <button id="showAddProductBtn">Añadir Producto</button>
    <h2>Total en caja: €<span id="totalCaja">0</span></h2>
  </div>

  <div id="addProductForm"></div>
  <div id="productos"></div>

  <h2>Historial de ventas</h2>
  <ul id="historial"></ul>

  <h2>Retirar dinero</h2>
  <input type="text" id="nombreRetirada" placeholder="Nombre">
  <input type="number" id="cantidadRetirada" placeholder="Cantidad">
  <button id="retirarBtn">Retirar</button>

  <h3>Historial de retiradas</h3>
  <ul id="historialRetiradas"></ul>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
