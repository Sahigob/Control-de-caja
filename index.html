<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caja Asociación</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; text-align: center; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px auto; padding: 10px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; margin: 5px; }
        .btn-vender { background: #27ae60; }
        .btn-retirar { background: #e74c3c; }
        #productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .producto { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; width: 150px; cursor: pointer; }
        .producto img { width: 80px; height: 80px; object-fit: contain; }
        header { background: #2c3e50; color: white; padding: 20px; font-size: 24px; }
        #historial { text-align: left; max-width: 500px; margin: 20px auto; background: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-div" class="card">
        <h2>Entrar</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="loginBtn">ENTRAR</button>
    </div>

    <div id="app-div" class="hidden">
        <header>
            CAJA: <span id="totalCaja">0.00</span>€
            <button onclick="window.location.reload()" style="float:right; font-size: 12px;">SALIR</button>
        </header>

        <h3>Toca un producto para venderlo:</h3>
        <div id="productos"></div>

        <hr>

        <div class="card">
            <h3>Retirar Dinero</h3>
            <input type="text" id="nombreRetirada" placeholder="¿Quién retira?">
            <input type="number" id="cantidadRetirada" placeholder="Cantidad €">
            <button id="retirarBtn" class="btn-retirar">REGISTRAR RETIRADA</button>
        </div>

        <h3>Últimos Movimientos:</h3>
        <div id="historial"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt5Ldo_-62A82ZmsxP5nB87LsefAPIxR0",
            authDomain: "control-de-caja-41341.firebaseapp.com",
            projectId: "control-de-caja-41341",
            storageBucket: "control-de-caja-41341.firebasestorage.app",
            messagingSenderId: "802067725052",
            appId: "1:802067725052:web:a583fab3a16d4f8025f579"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let totalCajaVentas = 0;
        let totalCajaRetiradas = 0;

        // BOTÓN LOGIN
        document.getElementById("loginBtn").onclick = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error: " + err.message));
        };

        // DETECTAR USUARIO
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById("login-div").classList.add("hidden");
                document.getElementById("app-div").classList.remove("hidden");
                cargarTodo();
            }
        });

        function cargarTodo() {
            // Cargar Productos
            onSnapshot(collection(db, "productos"), snap => {
                const div = document.getElementById("productos");
                div.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const item = document.createElement("div");
                    item.className = "producto";
                    item.innerHTML = `<img src="${p.img || ''}"><br><b>${d.id}</b><br>${p.precio}€`;
                    item.onclick = () => vender(d.id, p.precio, p.stock);
                    div.appendChild(item);
                });
            });

            // Sumar Ventas
            onSnapshot(collection(db, "ventas"), snap => {
                totalCajaVentas = 0;
                snap.forEach(d => totalCajaVentas += d.data().total);
                actualizarCaja();
            });

            // Sumar Retiradas y Mostrar Historial
            onSnapshot(query(collection(db, "retiradas"), orderBy("fecha", "desc"), limit(5)), snap => {
                totalCajaRetiradas = 0;
                const hist = document.getElementById("historial");
                hist.innerHTML = "";
                
                // Calculamos el total de TODAS las retiradas
                onSnapshot(collection(db, "retiradas"), all => {
                    totalCajaRetiradas = 0;
                    all.forEach(d => totalCajaRetiradas += d.data().cantidad);
                    actualizarCaja();
                });

                snap.forEach(d => {
                    const r = d.data();
                    hist.innerHTML += `<li>${r.nombre}: -${r.cantidad}€</li>`;
                });
            });
        }

        async function vender(id, precio, stock) {
            if(confirm("¿Vender " + id + "?")) {
                await addDoc(collection(db, "ventas"), { 
                    producto: id, total: precio, fecha: new Date().toISOString(), usuario: auth.currentUser.email 
                });
                await updateDoc(doc(db, "productos", id), { stock: (stock || 1) - 1 });
            }
        }

        document.getElementById("retirarBtn").onclick = async () => {
            const n = document.getElementById("nombreRetirada").value;
            const c = parseFloat(document.getElementById("cantidadRetirada").value);
            if(!n || !c) return alert("Faltan datos");
            await addDoc(collection(db, "retiradas"), { 
                nombre: n, cantidad: c, fecha: new Date().toISOString(), usuario: auth.currentUser.email 
            });
            document.getElementById("cantidadRetirada").value = "";
        };

        function actualizarCaja() {
            document.getElementById("totalCaja").textContent = (totalCajaVentas - totalCajaRetiradas).toFixed(2);
        }
    </script>
</body>
</html>
